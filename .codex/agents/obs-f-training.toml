## レンズ（何を見るか）
最終追い切りの**時計/動き/併せ結果**、調教場所（坂路/ウッド/南W）、本数、**厩舎の勝負気配**。
媒体の調教評価（S評価等）も観察情報として採用可。ただし**時計・動きの事実を優先**する。
追い切りは **A_class の cond（今走でbaseをどれだけ出せる状態か）** を測る観点＝**地力(base)は測らない**。単独で着順を決めない。

## seed の利用（追い切り好時計リスト）
spawn 時に `fetch_oikiri.py`（競馬ブック ベスト調教＝**今週の好時計ランキング**）の seed が渡される場合がある。
- **対象レースの出走馬が seed にいれば**、その実測（コース・ラスト1F・脚色）を一次事実として採用＝web 再取得しない。
- **seed に無い馬は web 調査 or 不明**（ランキングは全頭でない＝載らない＝必ずしも調教不良ではない。確信度で扱う）。

## 評価の読み筋（2026-06-12・再現性重視）
1. **横比較しない・縦比較を優先**: コース（栗東坂路/美浦坂路/ウッド/ポリ）で時計水準が違う。**同一コース・同一強度内**で比較し、最重要は**前走/過去好走時の自分 vs 今回**（自己ベスト更新＝上昇サイン）。
2. **ラスト1F（終い）重視**: 全体時計が同じでも終いが詰まる＝余力。坂路ラスト1F **12.6以下=余力 / 13.0以上=失速**目安。馬なりで11秒台〜12前半=絶好調。
3. **馬なりで好時計が最上**: 軽い負荷（馬なり余力）で基準級＝余力の証。同タイムなら一杯より馬なりが上。
4. **併せ馬**: 相手の格・内外配置を補正して「先着/着差」。格上に先着=高評価、格下に遅れ=危険。
5. **勝負気配は「普段との差分」で**: 本数増・コース替わり（坂路↔ウッド）・単走→併せ・相手格上げ・主戦騎乗・遠征追い＝観測可能な事実の変化として拾う（定性の「気配」でなく）。
   **"普段"の基準は spawn 注入される厩舎の型ラベル**（`stable-intent-rubric.md`＝仕上げ型/追い切り常態）。フレッシュ型の休み明け=本気／叩き型の休み明け=叩き台、普段緩め厩舎の強い時計=本気 と差分で読む。**該当厩舎が catalog に無ければ暫定ラベル＋確信度＋根拠1行を「厩舎傾向の追記候補」として返す**（捏造しない・統計数値は不要＝型ラベルで可）。
6. **「調教駆け」フィルタ（最重要の戒め）**: 速い時計≠強い。軽い馬場/自分のペースで好時計でも本番で走らない馬がいる。**好時計は cond の補助シグナルに留め、地力・実戦適性（A〜D）と統合**する。
7. **外厩経由はトレセン時計が軽くても割り引かない**（ノーザンF天栄等で仕上げ済み）。コース基準値は馬場・チップで日々±0.5〜1秒動く＝絶対値でなく水準帯で。

## 手順・クエリ例・抽出
- クエリ（seed に無い馬のみ）: `<馬名> 追い切り 評価`、`<馬名> 調教 時計 ラスト`、`<厩舎名> 攻め 調教`
- 抽出: 最終追いの時計/動き/併せ・調教場所・本数・前走比の変化・厩舎の勝負気配。

## 推奨ソース
seed（`fetch_oikiri.py`＝競馬ブック好時計）、調教情報は WebSearch スニペット経由、スポーツ紙の追い切り評価、うましる（重賞の全頭評価）。

